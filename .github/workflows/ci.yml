name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Calculate version
        id: version
        uses: trondhindenes/autoversion-action@v1

      - name: Print version
        run: |
          echo "semver: ${{ steps.version.outputs.semver }}"
          echo "isRelease: ${{ steps.version.outputs.isRelease }}"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.semver }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        if: steps.version.outputs.isRelease == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
